<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evergreen 獸醫麻醉紀錄表 (8頁自適應圖表版)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 讓最外層容器可以盡量利用螢幕寬度 */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; padding: 10px; background-color: #d1d5db; margin-bottom: 50px; }
        .app-container { width: 100%; max-width: 1600px; margin: auto; }
        * { box-sizing: border-box; }
        
        /* --- 頂部輸入面板 --- */
        .input-panel { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-end; justify-content: flex-start; }
        .input-group { display: flex; flex-direction: column; width: 75px; } 
        .input-group label { font-size: 11px; font-weight: bold; color: #4a5568; margin-bottom: 4px; white-space: nowrap; }
        .input-group input, .input-group select { padding: 6px; border: 1px solid #cbd5e0; border-radius: 4px; font-size: 13px; text-align: center; }
        
        .time-group { width: 130px !important; }
        .time-group input { background-color: #fffaf0; border: 1px solid #f6ad55; font-weight: bold; font-size: 14px; }
        
        .fluid-group { width: 130px !important; }
        .fluid-inputs { display: flex; gap: 4px; }
        .fluid-inputs select { width: 60px; padding: 4px; font-size: 11px; }
        .fluid-inputs input { width: 65px; }
        
        .btn-panel { display: flex; gap: 10px; margin-left: auto; }
        .btn-add { background-color: #2b6cb0; color: white; border: none; border-radius: 4px; padding: 0 25px; font-weight: bold; cursor: pointer; height: 42px; font-size: 15px; }
        .btn-add:hover { background-color: #2c5282; }

        /* 術中針劑區塊樣式 */
        .plan-block { width: 100%; margin-top: 15px; border: 1px solid #cbd5e0; border-radius: 6px; background-color: white; }
        .plan-block-header { background-color: #2b6cb0; color: white; padding: 6px 15px; border-radius: 6px 6px 0 0; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 13px; }
        
        .med-table { width: 100%; border-collapse: collapse; text-align: center; font-size: 11px; table-layout: fixed; }
        .med-table th { border: 1px solid #e2e8f0; padding: 4px; background-color: #edf2f7; font-weight: bold; color: #4a5568; border-top: none; }
        .med-table td { border: 1px solid #e2e8f0; padding: 2px; position: relative; vertical-align: middle; }
        .med-table input, .med-table select { width: 100%; border: none; outline: none; text-align: center; font-size: 12px; padding: 2px; background: transparent; font-family: inherit; font-weight: bold; color: #2d3748; }
        .calc-result { background-color: #f0fff4 !important; font-weight: bold; color: #276749 !important; }
        .drug-reference { font-size: 9px; color: #2f855a; display: block; text-align: left; padding-left: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- 分頁與圖表控制面板 --- */
        .pagination-panel { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; padding: 10px 15px; background: white; border: 3px solid #000; font-weight: bold; }
        .page-btn { padding: 6px 20px; border: 2px solid #2b6cb0; background: white; color: #2b6cb0; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; transition: all 0.2s; }
        .page-btn.active { background: #2b6cb0; color: white; }
        .page-view { display: none; }
        .page-view.active { display: block; }

        .chart-controls-panel { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 10px; padding: 8px 15px; background: #ebf8ff; border: 1px solid #90cdf4; border-radius: 6px; }
        .line-toggle-btn { padding: 4px 15px; border: 2px solid #718096; background: white; color: #4a5568; border-radius: 15px; cursor: pointer; font-size: 12px; font-weight: bold; transition: all 0.2s; }
        .line-toggle-btn.active { background: #4a5568; color: white; border-color: #4a5568; }
        
        .print-only-header { display: none; } 

        /* --- UCD 表單主體 --- */
        .ucd-form-container { background: white; border: 3px solid #000; box-shadow: 0 10px 20px rgba(0,0,0,0.15); display: flex; flex-direction: column; width: 100%; }
        .ucd-top-info { padding: 10px 15px; border-bottom: 2px solid #000; }
        .header-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 20px; margin-bottom: 5px; }
        .info-col { display: flex; flex-direction: column; gap: 4px; font-size: 13px; font-weight: bold; }
        .info-line { display: flex; align-items: flex-end; }
        .info-line span { white-space: nowrap; margin-right: 5px; color: #2d3748; }
        .info-line input, .info-line select { border: none; border-bottom: 1px solid #718096; flex-grow: 1; outline: none; font-size: 14px; font-family: inherit; padding-left: 5px; background: transparent; font-weight: bold; cursor: pointer; }
        .center-title { text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .section-divider { background-color: #edf2f7; padding: 4px 8px; font-weight: bold; border-left: 4px solid #4a5568; margin: 10px 0 5px 0; font-size: 13px; color: #1a202c; display: flex; justify-content: space-between; align-items: center; }
        
        .record-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .record-table th, .record-table td { border: 1px solid #718096; text-align: center; font-size: 11px; height: 18px; box-sizing: border-box; overflow: hidden; padding: 0; }
        .row-header { width: 75px; max-width: 75px; min-width: 75px; text-align: right; padding-right: 4px; font-weight: bold; background-color: #edf2f7; border-right: 2px solid #000; box-sizing: border-box; }
        
        /* 統一資料格：強制全黑、允許換行 */
        .data-cell { color: #000 !important; font-weight: bold; white-space: pre-wrap; font-size: 10px; line-height: 1; word-break: break-word; }
        
        .chart-wrapper { width: 100%; border-top: 2px solid #000; border-bottom: 2px solid #000; background-color: #fff; position: relative; }
        canvas { display: block; width: 100%; height: 320px !important; }
        
        .btn-del { color: #e53e3e; background: none; border: none; cursor: pointer; font-size: 14px; font-weight: bold; padding: 2px 5px; }

        @media print {
            @page { size: A3 landscape; margin: 10mm; }
            body { background-color: white; margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .input-panel, .bottom-export-panel, .btn-toggle-all, .btn-toggle-block, .btn-del, .drug-selector, .pagination-panel, .chart-controls-panel { display: none !important; }
            .ucd-form-container { box-shadow: none !important; border: none !important; background: transparent !important; }
            .ucd-top-info, .plan-container, .horizontal-times-bar, .page-view { border: 2px solid #000; margin-bottom: 15px; break-inside: avoid; }
            .page-view.page-2, .page-view.page-3, .page-view.page-4, .page-view.page-5, .page-view.page-6, .page-view.page-7, .page-view.page-8 { page-break-before: always; }
            .print-only-header { display: block !important; font-size: 16px; font-weight: bold; border-bottom: 2px solid #000; margin-bottom: 10px; padding: 5px 10px; background-color: #edf2f7; }
            canvas { height: 320px !important; width: 100% !important; }
        }
    </style>
</head>
<body>

<div class="app-container">

    <div class="input-panel">
        <div class="input-group time-group"><label>紀錄時間</label><input type="time" id="record-time"></div>
        <div class="input-group"><label>Anes %</label><input type="text" id="anes" placeholder="%"></div>
        <div class="input-group"><label>O2 L/min</label><input type="text" id="o2" placeholder="L/min"></div>
        <div class="input-group"><label>SpO2</label><input type="number" id="spo2" placeholder="%"></div>
        <div class="input-group"><label>ETCO2</label><input type="number" id="etco2" placeholder="mmHg"></div>
        <div class="input-group"><label>Peak</label><input type="number" id="peak" placeholder="cmH2O"></div>
        <div class="input-group"><label>TV</label><input type="number" id="tv" placeholder="ml"></div>
        <div class="input-group"><label>RR</label><input type="number" id="rr" placeholder="bpm"></div>
        
        <div style="width: 2px; background: #cbd5e0; margin: 0 5px;"></div>
        <div class="input-group"><label>Pulse (•)</label><input type="number" id="pulse" placeholder="bpm"></div>
        <div class="input-group"><label>Sys BP (V)</label><input type="number" id="sysBP" placeholder="mmHg"></div>
        <div class="input-group"><label>Dia BP (^)</label><input type="number" id="diaBP" placeholder="mmHg"></div>
        <div class="input-group"><label>Mean BP (x)</label><input type="number" id="meanBP" placeholder="mmHg"></div>
        <div style="width: 2px; background: #cbd5e0; margin: 0 5px;"></div>
        
        <div class="input-group fluid-group">
            <label>Fluids</label>
            <div class="fluid-inputs">
                <select id="fluid-type">
                    <option value="LRS">LRS</option>
                    <option value="0.9% NaCl">0.9% NaCl</option>
                    <option value="RS">RS</option>
                    <option value="NS">NS</option>
                </select>
                <input type="number" id="fluids" placeholder="ml">
            </div>
        </div>
        
        <div class="input-group"><label>Temp</label><input type="number" id="temp" step="0.1" placeholder="°C"></div>
        <div class="input-group cri-group"><label>CRI</label><input type="text" id="cri" placeholder="CRI"></div>
        
        <div class="plan-block" style="width: 100%; margin-top: 15px; border-color: #cbd5e0; box-shadow: none;">
            <div class="plan-block-header" style="background-color: #2b6cb0;">
                <span>💉 術中針劑給予</span>
                <div>
                    <select class="drug-selector" onchange="addIntraopBolus(this)" style="font-weight:normal; font-size: 11px;">
                        <option value="">+ 選擇藥物...</option>
                        <option value="CUSTOM">自訂藥物 (Custom)</option>
                    </select>
                </div>
            </div>
            <div class="plan-block-body">
                <table class="med-table">
                    <thead>
                        <tr>
                            <th style="width: 25%;">Drug Name</th><th style="width: 12%;">Dose</th><th style="width: 12%;">Unit</th><th style="width: 15%;">Conc. (mg/ml)</th>
                            <th style="width: 12%;">Total (mg)</th><th style="width: 12%;">Amount (mls)</th><th style="width: 10%;">Route</th><th style="width: 5%;"></th>
                        </tr>
                    </thead>
                    <tbody id="tbody-intraop"></tbody>
                </table>
            </div>
        </div>

        <div class="btn-panel" style="margin-top: 10px; width: 100%; display: flex; justify-content: flex-end;">
            <button class="btn-add" onclick="addRecord()">填入下方網格記錄表 ⬇</button>
        </div>
    </div>

    <div class="ucd-form-container" id="pdf-content">
        <div class="ucd-top-info">
            <div class="header-grid">
                <div class="info-col">
                    <div class="info-line"><span>Animal ID #:</span><input type="text" oninput="syncPatientId(this.value)"></div>
                    <div class="info-line"><span>Weight (Kg):</span><input type="number" id="patient-weight" style="width: 60px;" oninput="updateGlobalCalculations()"></div>
                </div>
                <div class="center-title">
                    <div style="font-size: 20px; font-weight: bold;">Evergreen</div>
                    <div style="font-size: 14px; margin-bottom: 10px;">Evergreen Veterinary Services</div>
                    <div style="font-size: 24px; font-weight: bold; text-decoration: underline;">Anesthesia Record</div>
                </div>
                <div class="info-col">
                    <div class="info-line"><span>Date:</span><input type="date"></div>
                    <div class="info-line"><span>Anesthetist:</span><input type="text"></div>
                </div>
            </div>
        </div>

        <div class="pagination-panel">
            <button id="btn-page-1" class="page-btn active" onclick="switchPage(1)">第一頁</button>
            <button id="btn-page-2" class="page-btn" onclick="switchPage(2)">第二頁</button>
            <button id="btn-page-3" class="page-btn" onclick="switchPage(3)">第三頁</button>
            <button id="btn-page-4" class="page-btn" onclick="switchPage(4)">第四頁</button>
            <button id="btn-page-5" class="page-btn" onclick="switchPage(5)">第五頁</button>
            <button id="btn-page-6" class="page-btn" onclick="switchPage(6)">第六頁</button>
            <button id="btn-page-7" class="page-btn" onclick="switchPage(7)">第七頁</button>
            <button id="btn-page-8" class="page-btn" onclick="switchPage(8)">第八頁</button>
        </div>

        <div class="chart-controls-panel">
            <span style="font-size: 13px; font-weight: bold; color: #4a5568;">圖表折線顯示：</span>
            <button class="line-toggle-btn" onclick="toggleLine(0, this)">Pulse</button>
            <button class="line-toggle-btn" onclick="toggleLine(1, this)">Sys BP</button>
            <button class="line-toggle-btn" onclick="toggleLine(2, this)">Dia BP</button>
            <button class="line-toggle-btn" onclick="toggleLine(3, this)">Mean BP</button>
            <button class="line-toggle-btn" onclick="toggleLine(4, this)">SpO2</button>
            <button class="line-toggle-btn" onclick="toggleLine(5, this)">ETCO2</button>
            <button class="line-toggle-btn" onclick="toggleLine(6, this)">RR</button>
            <button class="line-toggle-btn" onclick="toggleLine(7, this)">Temp</button>
        </div>
        
        <div id="grids-wrapper" style="width: 100%;"></div>

        <div class="ucd-comments" style="margin-top: 10px;">
            <div class="comments-title">Comments:</div>
            <textarea class="comments-box" placeholder="備註..."></textarea>
        </div>
    </div> 

    <div class="bottom-export-panel" style="display:flex; justify-content:center; gap:20px; margin-top:20px;">
        <button class="btn-export btn-export-pdf" onclick="window.print()" style="padding:15px 40px; cursor:pointer; font-weight:bold;">📄 列印 / 另存 PDF</button>
        <button class="btn-export btn-export-csv" onclick="exportCSV()" style="padding:15px 40px; cursor:pointer; font-weight:bold;">📊 匯出 CSV</button>
    </div>
</div>

<script>
// ================= 全域變數與資料庫 =================
const drugDB = {
    "Dexmedetomidine": { conc: 0.5, dose: 5, unit: "mcg/kg" },
    "Morphine": { conc: 10, dose: 0.3, unit: "mg/kg" },
    "Propofol": { conc: 10, dose: 4, unit: "mg/kg" }
};

const syringeIcon = new Image();
syringeIcon.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><text x="50%" y="50%" font-size="16" text-anchor="middle" dominant-baseline="central">💉</text></svg>';

const TOTAL_PAGES = 8, SLOTS_PER_PAGE = 30;
let currentGlobalSlot = 0, charts = [], timeInputEdited = false;

// ================= Y 軸自適應轉換公式 =================
function mapY(val) {
    if (val === null || val === undefined || val === '') return null;
    let v = Number(val); if (isNaN(v)) return null;
    if (v <= 50) return v / 5;
    if (v <= 100) return 10 + (v - 50) / 10;
    return 15 + (v - 100) / 20;
}

// ================= 多頁面架構建立 =================
const topRowDefs = [
    { id: 'row-time', name: 'Time', bg: '#e2e8f0' },
    { id: 'row-anes', name: 'Anesthetic' }, { id: 'row-o2', name: 'O2 L/min' }, { id: 'row-spo2', name: 'SpO2' },
    { id: 'row-etco2', name: 'ETCO2' }, { id: 'row-peak', name: 'Peak' }, { id: 'row-tv', name: 'TV' }, { id: 'row-rr', name: 'RR' },
    { id: 'row-pulse', name: 'Pulse' }, { id: 'row-sysbp', name: 'Sys BP' }, { id: 'row-diabp', name: 'Dia BP' }, { id: 'row-meanbp', name: 'Mean BP' }
];
const bottomRowDefs = [
    { id: 'row-time-bottom', name: 'Time', bg: '#e2e8f0' },
    { id: 'row-fluids', name: 'Fluids' }, { id: 'row-temp', name: 'Temp (°C)' },
    { id: 'row-cri', name: 'CRI', height: '25px' },
    { id: 'row-bolus', name: '術中針劑', height: '25px', cellStyle: 'white-space: normal; word-break: break-all; line-height: 1.1; padding: 2px; color: #c53030 !important;' }
];

function buildMultiPageGrids() {
    let html = '';
    for (let p = 1; p <= TOTAL_PAGES; p++) {
        html += `<div class="page-view page-${p} ${p === 1 ? 'active' : ''}">`;
        if (p > 1) html += `<div class="print-only-header">Evergreen Record - Page ${p} | ID: <span class="print-id-sync"></span></div>`;
        html += `<table class="record-table">`;
        topRowDefs.forEach(r => {
            html += `<tr><td class="row-header" style="${r.bg?'background-color:'+r.bg+';':''}">${r.name}</td>`;
            for(let i=0; i<30; i++) html += `<td class="data-cell" id="${r.id}-${(p-1)*30+i}"></td>`;
            html += `</tr>`;
        });
        html += `</table><div class="chart-wrapper"><canvas id="anesthesiaChart-${p}"></canvas></div><table class="record-table">`;
        bottomRowDefs.forEach(r => {
            html += `<tr style="${r.height?'height:'+r.height+';':''}"><td class="row-header" style="${r.bg?'background-color:'+r.bg+';':''}">${r.name}</td>`;
            for(let i=0; i<30; i++) html += `<td class="data-cell" id="${r.id}-${(p-1)*30+i}" style="${r.cellStyle || ''}"></td>`;
            html += `</tr>`;
        });
        html += `</table></div>`;
    }
    document.getElementById('grids-wrapper').innerHTML = html;
}

function initCharts() {
    for (let p = 1; p <= TOTAL_PAGES; p++) {
        const chart = new Chart(document.getElementById(`anesthesiaChart-${p}`), {
            type: 'line',
            data: {
                labels: Array(30).fill(''),
                datasets: [
                    { label: 'Pulse', data: Array(30).fill(null), borderColor: 'red', backgroundColor: 'red', pointStyle: 'circle', showLine: false, borderDash: [5, 5], borderWidth: 1.5 },
                    { label: 'Sys', data: Array(30).fill(null), borderColor: 'blue', pointStyle: 'triangle', rotation: 180, showLine: false, borderDash: [5, 5], borderWidth: 1.5 },
                    { label: 'Dia', data: Array(30).fill(null), borderColor: 'blue', pointStyle: 'triangle', showLine: false, borderDash: [5, 5], borderWidth: 1.5 },
                    { label: 'Mean', data: Array(30).fill(null), borderColor: 'teal', pointStyle: 'crossRot', showLine: false, borderDash: [5, 5], borderWidth: 1.5 },
                    { label: 'SpO2', data: Array(30).fill(null), borderColor: 'purple', pointStyle: 'rect', showLine: false, borderDash: [5, 5], borderWidth: 1.5 },
                    { label: 'ETCO2', data: Array(30).fill(null), borderColor: 'green', pointStyle: 'rectRot', showLine: false, borderDash: [5, 5], borderWidth: 1.5 },
                    { label: 'RR', data: Array(30).fill(null), borderColor: 'red', pointStyle: 'star', showLine: false, borderDash: [5, 5], borderWidth: 1.5 },
                    { label: 'Temp', data: Array(30).fill(null), borderColor: 'deeppink', pointStyle: 'cross', showLine: false, borderDash: [5, 5], borderWidth: 1.5 },
                    { label: 'Bolus', data: Array(30).fill(null), pointRadius: 0, showLine: false }
                ]
            },
            plugins: [{
                id: 'customBolus',
                afterDatasetsDraw(chart) {
                    const ctx = chart.ctx;
                    const meta = chart.getDatasetMeta(8);
                    if (!meta.hidden && chart.data.bolusNames) {
                        meta.data.forEach((element, index) => {
                            const name = chart.data.bolusNames[index];
                            if (name && element.y !== undefined) {
                                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                                ctx.font = '14px Arial'; ctx.fillText('💉', element.x, element.y);
                                ctx.fillStyle = '#c53030'; ctx.font = 'bold 9px Arial';
                                ctx.fillText(name, element.x, element.y - 14);
                            }
                        });
                    }
                }
            }],
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    x: { offset: true, grid: { display: true, color: '#e2e8f0' }, ticks: { display: false } },
                    y: { 
                        min: 0, max: 25, 
                        ticks: { stepSize: 1, callback: (v) => v<=10?v*5 : v<=15?50+(v-10)*10 : 100+(v-15)*20 },
                        grid: { color: '#e2e8f0' }, afterFit: (s) => s.width = 75
                    }
                },
                plugins: { legend: { display: false } }, animation: false
            }
        });
        chart.data.bolusNames = Array(30).fill('');
        charts.push(chart);
    }
}

// ================= 功能函數 =================
window.onload = function() {
    buildMultiPageGrids(); initCharts();
    const timeIn = document.getElementById('record-time');
    const updateToNow = () => { if (!timeInputEdited) { const n = new Date(); timeIn.value = String(n.getHours()).padStart(2, '0') + ':' + String(n.getMinutes()).padStart(2, '0'); } };
    updateToNow();
    timeIn.addEventListener('input', () => timeInputEdited = true);
    setInterval(updateToNow, 30000);
};

function switchPage(p) {
    document.querySelectorAll('.page-btn').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.page-view').forEach(el => el.classList.remove('active'));
    document.getElementById(`btn-page-${p}`).classList.add('active');
    document.querySelector(`.page-view.page-${p}`).classList.add('active');
    if (charts[p-1]) { charts[p-1].resize(); charts[p-1].update(); }
}

function syncPatientId(v) { document.querySelectorAll('.print-id-sync').forEach(el => el.textContent = v); }

function toggleLine(idx, btn) {
    const isVisible = btn.classList.toggle('active');
    charts.forEach(c => { c.data.datasets[idx].showLine = isVisible; c.update(); });
}

// 💡 所有給藥的 Route 改為純文字手動輸入
function addDrugToSection(tbodyId, selectElem) {
    const drug = selectElem.value;
    if (!drug) return;
    const tbody = document.getElementById(tbodyId);
    const tr = document.createElement('tr');
    let dName = drug === 'CUSTOM' ? '' : drug;
    
    tr.innerHTML = `
        <td style="text-align: left; padding-left: 5px;"><input type="text" value="${dName}" class="r-drug" placeholder="Drug Name" style="text-align: left; font-weight:bold;"></td>
        <td style="width: 10%;"><input type="number" class="r-dose" step="0.01" oninput="calcRegular(this)"></td>
        <td style="width: 10%;"><select class="r-unit" onchange="calcRegular(this)"><option value="mg/kg">mg/kg</option><option value="mcg/kg">mcg/kg</option></select></td>
        <td style="width: 10%;"><input type="number" class="r-conc" step="0.01" oninput="calcRegular(this)"></td>
        <td style="width: 10%;"><input type="number" class="r-total calc-result" readonly tabindex="-1"></td>
        <td style="width: 10%;"><input type="number" class="r-amt calc-result" readonly tabindex="-1"></td>
        <td style="width: 10%;"><input type="text" class="r-route" placeholder="IV/IM"></td>
        <td style="width: 10%;"><input type="time"></td>
        <td style="width: 5%;"><button class="btn-del" onclick="this.closest('tr').remove();">×</button></td>
    `;
    tbody.appendChild(tr);
    selectElem.value = ""; 
}

function addIntraopBolus(sel) {
    if (!sel.value) return;
    const tr = document.createElement('tr');
    let dName = sel.value === 'CUSTOM' ? '' : sel.value;
    tr.innerHTML = `
        <td><input type="text" value="${dName}" class="r-drug" placeholder="Drug Name"></td>
        <td><input type="number" class="r-dose" step="0.01" oninput="calcInRow(this)"></td>
        <td><select class="r-unit" onchange="calcInRow(this)"><option value="mg/kg">mg/kg</option><option value="mcg/kg">mcg/kg</option></select></td>
        <td><input type="number" class="r-conc" step="0.01" oninput="calcInRow(this)"></td>
        <td><input class="calc-result" readonly tabindex="-1"></td>
        <td><input class="calc-result" readonly tabindex="-1"></td>
        <td><input type="text" class="r-route" placeholder="IV"></td>
        <td><button class="btn-del" onclick="this.closest('tr').remove();">×</button></td>
    `;
    document.getElementById('tbody-intraop').appendChild(tr); sel.value = "";
}

function calcRegular(elem) { calcInRow(elem); }

function calcInRow(el) {
    const row = el.closest('tr'), wt = parseFloat(document.getElementById('patient-weight').value);
    const dose = parseFloat(row.querySelector('.r-dose').value), unit = row.querySelector('.r-unit').value, conc = parseFloat(row.querySelector('.r-conc').value);
    if (wt && dose) {
        let totalMg = wt * (unit==='mcg/kg'?dose/1000:dose);
        row.cells[4].querySelector('input').value = totalMg.toFixed(2);
        if(conc) row.cells[5].querySelector('input').value = (totalMg/conc).toFixed(2);
    }
}

function autoFitText(id) {
    const el = document.getElementById(id); if (!el) return;
    let size = 10; el.style.fontSize = size + 'px';
    while (el.scrollHeight > 18 && size > 6) { size -= 0.5; el.style.fontSize = size + 'px'; }
}

function addRecord() {
    if (currentGlobalSlot >= 240) { alert('滿載！'); return; }
    const timeStr = document.getElementById('record-time').value;
    if (!timeStr) return;
    
    let pIdx = Math.floor(currentGlobalSlot / 30) + 1, lIdx = currentGlobalSlot % 30;
    switchPage(pIdx);

    const inputs = ['anes','o2','spo2','etco2','peak','tv','rr','pulse','sysBP','diaBP','meanBP','temp','cri'];
    inputs.forEach(id => {
        const cellId = `row-${id.toLowerCase()}-${currentGlobalSlot}`;
        const el = document.getElementById(cellId);
        if(el) { el.textContent = document.getElementById(id).value || '-'; autoFitText(cellId); }
    });

    const bolusRows = document.querySelectorAll('#tbody-intraop tr'), bTexts = [], bShort = [];
    bolusRows.forEach(row => {
        const n = row.querySelector('.r-drug').value, r = row.querySelector('.r-route').value;
        if(n) { bTexts.push(`${n} (${row.cells[5].querySelector('input').value}ml) ${r}`); bShort.push(n.substring(0,6)); }
    });

    const chart = charts[pIdx-1];
    const vals = ['pulse','sysBP','diaBP','meanBP','spo2','etco2','rr','temp'].map(id => Number(document.getElementById(id).value));
    vals.forEach((v, i) => chart.data.datasets[i].data[lIdx] = mapY(v));
    if(bShort.length) { chart.data.datasets[8].data[lIdx] = mapY(280); chart.data.bolusNames[lIdx] = bShort.join(', '); }
    chart.update();

    document.getElementById(`row-time-${currentGlobalSlot}`).textContent = timeStr;
    document.getElementById(`row-time-bottom-${currentGlobalSlot}`).textContent = timeStr;
    const fv = document.getElementById('fluids').value;
    document.getElementById(`row-fluids-${currentGlobalSlot}`).textContent = fv ? document.getElementById('fluid-type').value+' '+fv : '-';
    const bc = `row-bolus-${currentGlobalSlot}`;
    document.getElementById(bc).innerHTML = bTexts.join('<br>'); autoFitText(bc);

    currentGlobalSlot++; timeInputEdited = false;
    document.getElementById('tbody-intraop').innerHTML = '';
}

function exportCSV() {
    if (currentGlobalSlot === 0) return;
    let csv = "data:text/csv;charset=utf-8,\uFEFFTime,Anesthetic,O2,SpO2,ETCO2,Peak,TV,RR,Pulse,SysBP,DiaBP,MeanBP,Fluids,Temp,CRI,Bolus\n";
    for(let i=0; i<currentGlobalSlot; i++) {
        let row = ['row-time','row-anes','row-o2','row-spo2','row-etco2','row-peak','row-tv','row-rr','row-pulse','row-sysbp','row-diabp','row-meanbp','row-fluids','row-temp','row-cri','row-bolus'].map(id => document.getElementById(`${id}-${i}`).textContent.replace(/\n/g, '; '));
        csv += row.map(v => '"'+v+'"').join(",") + "\n";
    }
    const link = document.createElement("a"); link.href = encodeURI(csv); link.download = "Anesthesia_Record.csv"; link.click();
}

function updateGlobalCalculations() { document.querySelectorAll('.med-table .r-dose').forEach(el => calcInRow(el)); }
</script>
</body>
</html>
